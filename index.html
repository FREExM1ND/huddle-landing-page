<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>
      Frontend Mentor | Huddle landing page with single introductory section
    </title>
  </head>
  <body>
    <main class="landing">
      <img src="./images/logo.svg" alt="Huddle logo" class="landing__logo" />
      <section class="landing__card">
        <img
          src="./images/illustration-mockups.svg"
          alt=""
          aria-hidden="true"
          class="landing__hero"
        />
        <section class="landing__card--text">
          <h1 class="landing__card--heading">
            Build The Community Your Fans Will Love
          </h1>

          <p class="landing__card--description">
            Huddle re-imagines the way we build communities. You have a voice,
            but so does your audience. Create connections with your users as you
            engage in genuine discussion.
          </p>

          <button class="landing__card--register">Register</button>
        </section>
      </section>
      <section class="landing__links">
        <a href="#" class="fa fa-facebook"></a>
        <a href="#" class="fa fa-twitter"></a>
        <a href="#" class="fa fa-instagram"></a>
      </section>
    </main>
    <footer class="credits">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/huddle-landing-page-with-a-single-introductory-section-B_2Wvxgi0"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/FREExM1ND">Aaron Robbins</a>.
    </footer>
  </body>
</html>
